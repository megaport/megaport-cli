# Visit https://goreleaser.com for documentation on how to customize this
# behavior.
before:
  hooks:
    # this is just an example and not a requirement for provider building/publishing
    - go mod tidy
builds:
  - id: release
    env:
      # goreleaser does not work with CGO, it could also complicate
      # usage by users in CI/CD systems like Terraform Cloud where
      # they are unable to install libraries.
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X github.com/megaport/megaport-cli/internal/commands/version.version={{.Version}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'
  - id: docker
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X github.com/megaport/megaport-cli/internal/commands/version.version={{.Version}}'
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    binary: megaport-cli
archives:
  - id: release
    builds:
      - release
    format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256
signs:
  - artifacts: checksum
    args:
      # if you are using this in a GitHub action or some other automated pipeline, you
      # need to pass the batch flag to indicate its not interactive.
      - '--batch'
      - '--local-user'
      - '{{ .Env.GPG_FINGERPRINT }}' # set this environment variable for your signing key
      - '--output'
      - '${signature}'
      - '--detach-sign'
      - '${artifact}'
dockers:
  - ids:
      - docker
    image_templates:
      - "ghcr.io/megaport/megaport-cli:{{ .Tag }}-amd64"
      - "ghcr.io/megaport/megaport-cli:latest-amd64"
    dockerfile: Dockerfile.cli
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goos: linux
    goarch: amd64
  - ids:
      - docker
    image_templates:
      - "ghcr.io/megaport/megaport-cli:{{ .Tag }}-arm64"
      - "ghcr.io/megaport/megaport-cli:latest-arm64"
    dockerfile: Dockerfile.cli
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/megaport/megaport-cli:{{ .Tag }}"
    image_templates:
      - "ghcr.io/megaport/megaport-cli:{{ .Tag }}-amd64"
      - "ghcr.io/megaport/megaport-cli:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/megaport/megaport-cli:latest"
    image_templates:
      - "ghcr.io/megaport/megaport-cli:latest-amd64"
      - "ghcr.io/megaport/megaport-cli:latest-arm64"

brews:
  - ids:
      - release
    repository:
      owner: megaport
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/megaport/megaport-cli"
    description: "CLI tool for managing Megaport network infrastructure"
    license: "MPL-2.0"
    install: |
      if File.exist?("megaport-cli_v#{version}")
        bin.install "megaport-cli_v#{version}" => "megaport-cli"
      else
        bin.install "megaport-cli"
      end
    test: |
      assert_match "Megaport CLI Version", shell_output("#{bin}/megaport-cli version")
    skip_upload: auto

release:
  # If you want to manually examine the release before its live, uncomment this line:
  draft: true
changelog:
  skip: true

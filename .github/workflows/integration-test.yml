name: integration-tests
on:
  schedule:
    - cron: '0 2 * * *'  # Nightly, 02:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  # Fast read-only tests — runs on schedule and manual trigger
  integration-readonly:
    name: Integration Tests (Read-only)
    runs-on: ubuntu-latest
    # Two 5m test steps; allow headroom for checkout/setup-go and API slowness.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Run read-only integration tests
        run: |
          go test -tags integration -run '^TestIntegration_' -v -timeout 5m \
            ./internal/commands/billing_market/... \
            ./internal/commands/locations/... \
            ./internal/commands/managed_account/... \
            ./internal/commands/partners/... \
            ./internal/commands/product/... \
            ./internal/commands/servicekeys/... \
            ./internal/commands/status/... \
            ./internal/commands/topology/... \
            ./internal/commands/users/...
          go test -tags integration -run 'TestIntegration_.*ReadOnly$' -v -timeout 5m ./internal/commands/nat_gateway/...
        env:
          MEGAPORT_ACCESS_KEY: ${{ secrets.MEGAPORT_ACCESS_KEY }}
          MEGAPORT_SECRET_KEY: ${{ secrets.MEGAPORT_SECRET_KEY }}
          MEGAPORT_ENVIRONMENT: staging
      # ReadOnly-suffixed tests only — never the *Lifecycle provisioning tests in these packages.
      - name: Run read-only integration tests (core resources)
        run: |
          go test -tags integration -run 'TestIntegration_.*ReadOnly$' -v -timeout 5m \
            ./internal/commands/ix/... \
            ./internal/commands/mcr/... \
            ./internal/commands/mve/... \
            ./internal/commands/ports/... \
            ./internal/commands/vxc/...
        env:
          MEGAPORT_ACCESS_KEY: ${{ secrets.MEGAPORT_ACCESS_KEY }}
          MEGAPORT_SECRET_KEY: ${{ secrets.MEGAPORT_SECRET_KEY }}
          MEGAPORT_ENVIRONMENT: staging

  # Provisioning lifecycle tests — manual trigger only until all tests are written
  integration-provisioning:
    name: Integration Tests (Provisioning)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      # Add packages here as integration tests are written (see docs/INTEGRATION_TESTING.md)
      - name: Verify provisioning integration tests are discovered
        shell: bash
        run: |
          set -euo pipefail
          if ! list_output=$(go test -tags 'integration provisioning' -list '^TestIntegration_' \
            ./internal/commands/ports/... \
            ./internal/commands/vxc/... \
            ./internal/commands/mcr/... \
            ./internal/commands/mve/... \
            ./internal/commands/ix/... \
            ./internal/commands/servicekeys/... \
            ./internal/commands/users/... \
            ./internal/commands/nat_gateway/... \
            ./internal/commands/apply/... 2>&1); then
            echo "::error::go test -list failed — see build/compile errors below."
            echo "$list_output"
            exit 1
          fi
          discovered=$(printf '%s\n' "$list_output" | grep '^TestIntegration_' || true)
          if [ -z "$discovered" ]; then
            echo "::error::No TestIntegration_* tests discovered in the targeted packages."
            echo "Update the package list in .github/workflows/integration-test.yml as tests are added."
            exit 1
          fi
          echo "Discovered tests:"
          echo "$discovered"
      - name: Run provisioning integration tests
        run: go test -tags 'integration provisioning' -run '^TestIntegration_' -v -timeout 40m ./internal/commands/ports/... ./internal/commands/vxc/... ./internal/commands/mcr/... ./internal/commands/mve/... ./internal/commands/ix/... ./internal/commands/servicekeys/... ./internal/commands/users/... ./internal/commands/nat_gateway/... ./internal/commands/apply/...
        env:
          MEGAPORT_ACCESS_KEY: ${{ secrets.MEGAPORT_ACCESS_KEY }}
          MEGAPORT_SECRET_KEY: ${{ secrets.MEGAPORT_SECRET_KEY }}
          MEGAPORT_ENVIRONMENT: staging

  # Live staging e2e tests. Runs on schedule and manual trigger.
  # The tests self-skip when MEGAPORT_* secrets are absent.
  e2e-staging:
    name: E2E Tests (Staging)
    runs-on: ubuntu-latest
    # Test step has a 15m go-test timeout; allow headroom for checkout/setup-go.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Run staging e2e tests
        run: make e2e-staging
        env:
          MEGAPORT_ACCESS_KEY: ${{ secrets.MEGAPORT_ACCESS_KEY }}
          MEGAPORT_SECRET_KEY: ${{ secrets.MEGAPORT_SECRET_KEY }}
          MEGAPORT_ENVIRONMENT: staging

name: integration-tests
on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly, Monday 02:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: 'go.mod'
      - name: Run integration tests
        run: go test -tags integration -v -timeout 5m ./internal/commands/locations/... ./internal/commands/partners/...
        env:
          MEGAPORT_ACCESS_KEY: ${{ secrets.MEGAPORT_ACCESS_KEY }}
          MEGAPORT_SECRET_KEY: ${{ secrets.MEGAPORT_SECRET_KEY }}
          MEGAPORT_ENVIRONMENT: staging

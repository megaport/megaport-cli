name: wasm

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read

jobs:
  build-guard:
    name: Build Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Compile js/wasm target
        run: make wasm-build-guard
      - name: Vet js/wasm target
        # Compiles every wasm-tagged package, test files included, so any wasm
        # test file that stops building is caught here.
        run: make wasm-vet
      - name: Run WASM unit tests
        # wasm-vet above already compiles all wasm test packages. Only
        # ./cmd/megaport can also run under the bare go_js_wasm_exec (node)
        # runtime; the rest need a browser host (fetch, JS bridge globals, stdin
        # pipes) and are verified manually in-browser.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm ./cmd/megaport
      - name: Run WASM output-streaming unit tests
        # internal/wasm's browser-only tests are gated behind the `browser` build
        # tag, so the default js,wasm run compiles only the node-safe tests
        # (currently the output-streaming contract in output_handler_test.go).
        # No -run allowlist: any node-safe test added to the package runs here.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm ./internal/wasm

  smoke:
    name: Browser Fetch Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
      - name: Smoke-test locations list through the fetch transport
        run: make wasm-smoke
        env:
          MEGAPORT_ENVIRONMENT: staging

name: wasm

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read

jobs:
  build-guard:
    name: Build Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Compile js/wasm target
        run: make wasm-build-guard
      - name: Vet js/wasm target
        # Compiles every wasm-tagged package, test files included, so any wasm
        # test file that stops building is caught here.
        run: make wasm-vet
      - name: Run WASM unit tests
        # Runs the WASM tests that are safe under the bare go_js_wasm_exec (node)
        # runtime. ./cmd/megaport and the whole ./internal/base/output wasm suite
        # run cleanly under node; the rest need a browser host (fetch, JS bridge
        # globals, stdin pipes) and are verified manually in-browser.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm ./cmd/megaport ./internal/base/output
      - name: Run WASM output-streaming unit tests
        # internal/wasm's browser-only tests live in wasm_browser_test.go behind
        # the `browser` build tag, so the default js,wasm run compiles only the
        # node-safe tests (wasm_test.go, output_handler_test.go, etc.).
        # No -run allowlist: any node-safe test added to the package runs here.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm ./internal/wasm
      - name: Run WASM output-priority regression tests
        # The TestGetCapturedOutput_* tests only touch JS globals + buffers, so
        # they run fine under node even though the rest of this package needs a
        # browser host. Without this step the regression coverage runs nowhere.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm \
            -run 'TestGetCapturedOutput' ./internal/base/output
      - name: Run WASM fetch-transport unit tests
        # The wasmhttp tests mock the global fetch and need only Promise /
        # AbortController / AbortSignal, all present in the node runtime, so
        # the whole package runs headlessly here.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm ./internal/wasm/wasmhttp
      - name: Run WASM login auth-routing unit tests
        # The config package's wasm login tests build clients without issuing a
        # request, so they only touch JS globals + env vars and run under node.
        # This is where the apiURL-trust regression coverage actually executes.
        run: |
          export PATH="$PATH:$(go env GOROOT)/lib/wasm"
          GOOS=js GOARCH=wasm go test -v -tags js,wasm ./internal/commands/config

  smoke:
    name: Browser Fetch Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
      - name: Smoke-test locations list through the fetch transport
        run: make wasm-smoke
        env:
          MEGAPORT_ENVIRONMENT: staging

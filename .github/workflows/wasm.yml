name: wasm

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read

jobs:
  build-guard:
    name: Build Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Compile js/wasm target
        run: make wasm-build-guard

  smoke:
    name: Browser Fetch Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Smoke-test locations list through the fetch transport
        run: make wasm-smoke
        env:
          MEGAPORT_ENVIRONMENT: staging

# Canonical port lifecycle scenario.
#
# Drives a single 1Gbps port through buy -> verify -> list -> delete ->
# verify-gone using the megaport-cli binary, with HTTP cross-checks against
# the same staging API megatest authenticates to.
#
# Pre-reqs:
# - megatest's api-tester runner (`python3 runner.py`) plus `MEGAPORT_ENV=staging`
#   so the runner's HTTP steps target the staging API.
# - megaport-cli on PATH. Each `cli` step below pins `MEGAPORT_ENVIRONMENT=staging`
#   in its own `env:` block so the binary cannot accidentally fall through to
#   its `production` default even when the operator forgets to export it.
# - Staging credentials resolved via megatest's `credentials.yml` (or
#   `MEGAPORT_ACCESS_KEY` / `MEGAPORT_SECRET_KEY` / `MEGAPORT_ACCESS_TOKEN`
#   forwarded into the per-step env block).

user: admin
description: 'Buy a 1Gbps port, verify via API, list, delete, verify gone'
stop_on_failure: true

config:
    - ../products.yml

steps:
    - type: cli
      description: 'Buy a 1Gbps port (no-wait, skip confirmation)'
      env:
          MEGAPORT_ENVIRONMENT: staging
      cmd:
          - megaport-cli
          - ports
          - buy
          - --name
          - 'megatest-{run_uid}'
          - --term
          - '{term}'
          - --port-speed
          - '{port_speed}'
          - --location-id
          - '{location_id}'
          - --marketplace-visibility
          - 'false'
          - --yes
          - --no-wait
          - --output
          - json
      expect:
          exit: 0
          stderr:
              _text: { contains: 'Port created' }

    - type: cli
      description: 'List ports and capture the new port UID by name'
      env:
          MEGAPORT_ENVIRONMENT: staging
      cmd: ['megaport-cli', 'ports', 'list', '--output', 'json']
      expect:
          exit: 0
      capture:
          port_uid: "$[?(@.name=='megatest-{run_uid}')].uid"

    - method: GET
      path: /v2/product/{port_uid}
      description: 'Staging API agrees the port exists and is in a live state'
      expect:
          status: 200
          body:
              data.productUid: '{port_uid}'
              data.provisioningStatus:
                  { in: ['DEPLOYABLE', 'CONFIGURING', 'CONFIGURED', 'LIVE'] }

    - type: cli
      description: 'Re-list and assert the new port UID is present in stdout'
      env:
          MEGAPORT_ENVIRONMENT: staging
      cmd: ['megaport-cli', 'ports', 'list', '--output', 'json']
      expect:
          exit: 0
          stdout:
              _text: { contains: '{port_uid}' }

    - type: cli
      description: 'Delete the port (force, no confirmation)'
      env:
          MEGAPORT_ENVIRONMENT: staging
      cmd:
          - megaport-cli
          - ports
          - delete
          - '{port_uid}'
          - --force
          - --output
          - json
      expect:
          exit: 0

    - method: GET
      path: /v2/product/{port_uid}
      description: 'Staging API reflects the cancellation'
      expect:
          status: 200
          body:
              data.provisioningStatus:
                  { in: ['CANCELLED', 'CANCELLED_PARENT', 'DECOMMISSIONED', 'DECOMMISSIONING'] }
